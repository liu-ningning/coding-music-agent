<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <!-- 背景渐变：与 accent 色系一致的深青绿 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3D8A8A"/>
      <stop offset="50%" stop-color="#4A9A9A"/>
      <stop offset="100%" stop-color="#58A6A6"/>
    </linearGradient>
    <!-- 图标渐变：白色带微光 -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d4f0f0" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆角方形背景 -->
  <rect width="40" height="40" rx="10" fill="url(#bgGrad)"/>

  <!-- 内部微光边框 -->
  <rect x="1" y="1" width="38" height="38" rx="9" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.5"/>

  <!-- 代码符号: 左尖括号 < -->
  <path d="M12 14L7 20L12 26" stroke="url(#iconGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 代码符号: 右尖括号 > -->
  <path d="M28 14L33 20L28 26" stroke="url(#iconGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 中间音符: 竖线 -->
  <line x1="20" y1="11" x2="20" y2="27" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- 中间音符: 符头（椭圆） -->
  <ellipse cx="17" cy="27" rx="3.5" ry="2.5" transform="rotate(-20 17 27)" fill="url(#iconGrad)" filter="url(#glow)"/>

  <!-- 音波扩散线 -->
  <path d="M24 15C26 16 27 18 27 20C27 22 26 24 24 25" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- 底部AI光点 -->
  <circle cx="20" cy="32" r="1" fill="rgba(255,255,255,0.6)"/>
</svg>
